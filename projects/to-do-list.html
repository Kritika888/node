<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .to-do-list{
            background-color: #a83f3f;
            width: 400px;
            padding: 20px;
            border-radius: 30px; 
            display: flex;
            flex-direction: column; 
        }
        body {
            background-color: #e0a9a9;
        }
        h1 {
            Text-align: center;
            color: white;
            font-family: 'Monaco', monospace;
        }
        .item-list {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: stretch;
            gap: 10px;
        }
        .add-button{
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        .btn-button{
            background-color: #e0a9a9;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            color: #370b0b;
        }
        .todo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            background-color: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px;
        }
        .todo-row input[type="text"] {
            flex: 1;
            padding: 5px;
            border: none;
            outline: none;
        }
        .todo-row button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        .remove-btn {
            background-color: #aca6a6b8;
            color: #370b0b;
            border: none;
            border-radius: 5px;
        }
        .todo-row input[type="checkbox"] {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="to-do-list">
            <h1>To Do List</h1>
            <div id="itemList" class="item-list"></div>
            <div class="add-button">
                <button onclick="addItem()" class="btn-button">
                    Add Item
                </button>
            </div>
        </div>
    </div>

    <script>
        addItem();

        function addItem() {
            //create new each element
            let checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            let textbox = document.createElement('input');
            textbox.type = 'text';
            textbox.style.borderRadius = '5px';
            let removeButton = document.createElement('button');
            removeButton.innerText = '-';
            removeButton.classList.add("remove-btn");
            removeButton.onclick = removeItem;

            let row = document.createElement('div');
            row.appendChild(checkbox);
            row.appendChild(textbox);
            row.appendChild(removeButton);
            row.classList.add("todo-row");

            //get the item list
            let itemList = document.getElementById('itemList');

            itemList.appendChild(row);
        }

        function removeItem(event) {
            let row = event.target.parentElement;
            row.remove();
        }
    </script>
</body>
</html>
